<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매치코치 — 스포츠강사 구인구직</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F4F6F8;color:#111827;min-height:100vh;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#0F1B2D;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:28px;}
.login-sub{font-size:14px;color:#9CA3AF;text-align:center;line-height:1.7;}
.btn-google{display:flex;align-items:center;gap:12px;background:white;color:#1F1F1F;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:transform 0.15s;}
.btn-google:hover{transform:translateY(-2px);}
.login-note{font-size:12px;color:#6B7280;text-align:center;max-width:280px;line-height:1.6;}
#app{display:none;}

/* HEADER */
header{background:#0F1B2D;border-bottom:2px solid #0062FF;position:sticky;top:0;z-index:100;}
.header-inner{max-width:1400px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-text{color:white;font-weight:700;font-size:16px;}
.header-right{display:flex;align-items:center;gap:12px;}
.stat-bar{display:flex;gap:16px;}
.stat-item{font-size:12px;color:#9CA3AF;display:flex;align-items:center;gap:4px;}
.stat-item strong{color:#0062FF;font-weight:700;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-av{width:28px;height:28px;border-radius:50%;border:2px solid #0062FF;object-fit:cover;}
.user-nm{font-size:12px;color:#D1D5DB;}
.btn-logout{padding:5px 12px;border-radius:16px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#9CA3AF;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* TOP BAR */
.topbar{background:white;border-bottom:1px solid #E5E7EB;padding:10px 20px;}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;gap:10px;align-items:center;}
.search-wrap{flex:1;display:flex;align-items:center;gap:8px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;}
.search-wrap input{background:none;border:none;outline:none;font-size:13px;width:100%;font-family:'Noto Sans KR',sans-serif;color:#111827;}
.search-wrap input::placeholder{color:#9CA3AF;}
.region-row{display:flex;gap:6px;align-items:center;}
.r-sel{font-size:12px;border:1px solid #E5E7EB;border-radius:7px;padding:7px 10px;background:white;color:#374151;outline:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-add{display:flex;align-items:center;gap:6px;background:#0062FF;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

/* LAYOUT */
.layout{max-width:1400px;margin:0 auto;padding:16px 20px 60px;display:flex;gap:16px;align-items:flex-start;}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0;background:white;border-radius:10px;border:1px solid #E5E7EB;padding:16px;position:sticky;top:72px;}
.sb-section{margin-bottom:18px;}
.sb-section:last-child{margin-bottom:0;}
.sb-title{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.sb-item{display:flex;align-items:center;gap:7px;padding:4px 0;cursor:pointer;}
.sb-item input[type=checkbox]{width:14px;height:14px;accent-color:#0062FF;cursor:pointer;flex-shrink:0;}
.sb-item label{font-size:12px;color:#374151;cursor:pointer;flex:1;}
.sb-item .cnt{font-size:10px;color:#9CA3AF;margin-left:auto;}
.sb-hint{font-size:10px;color:#9CA3AF;margin-top:8px;line-height:1.5;padding-top:8px;border-top:1px dashed #E5E7EB;}
.sb-reset{width:100%;padding:6px;border-radius:6px;background:#F9FAFB;border:1px solid #E5E7EB;font-size:11px;color:#6B7280;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:10px;}
.sb-reset:hover{background:#F3F4F6;}

/* MAIN */
.main{flex:1;min-width:0;}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.result-txt{font-size:13px;color:#6B7280;}<br>.result-txt strong{color:#111827;}
.view-btns{display:flex;gap:4px;}
.vb{padding:5px 8px;border-radius:6px;border:1px solid #E5E7EB;background:white;cursor:pointer;color:#9CA3AF;transition:all 0.1s;}
.vb.on{background:#0F1B2D;color:white;border-color:#0F1B2D;}

/* TABLE */
.tbl-wrap{background:white;border-radius:10px;border:1px solid #E5E7EB;overflow:hidden;}
.tbl-head{display:grid;grid-template-columns:180px 72px minmax(0,1fr) 140px 110px;padding:8px 16px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;}
.tbl-head span{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.4px;}
.tbl-head span:last-child{text-align:right;}
.tbl-row{display:grid;grid-template-columns:180px 72px minmax(0,1fr) 140px 110px;padding:10px 16px;border-bottom:1px solid #F3F4F6;align-items:center;cursor:pointer;transition:background 0.1s;}
.tbl-row:last-child{border-bottom:none;}
.tbl-row:hover{background:#FFF8F5;}
.tbl-row.mine{border-left:3px solid #0062FF;padding-left:13px;}
.cell-profile{display:flex;align-items:center;gap:8px;min-width:0;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.name-txt{font-size:13px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sub-txt{font-size:10px;color:#9CA3AF;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge.seek{background:#DCFCE7;color:#15803D;}
.badge.hire{background:#EFF6FF;color:#1D4ED8;}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.cell-sports{display:flex;gap:3px;align-items:center;overflow:hidden;}
.s-tag{font-size:10px;background:#F3E8FF;color:#6D28D9;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.s-more{font-size:10px;color:#9CA3AF;flex-shrink:0;}
.cell-region{font-size:11px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cell-action{display:flex;justify-content:flex-end;gap:5px;}
.btn-contact{font-size:11px;padding:5px 12px;border-radius:6px;background:#0062FF;color:white;border:none;cursor:pointer;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.btn-edit-s{font-size:11px;padding:5px 8px;border-radius:6px;background:#F3F4F6;color:#6B7280;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-del-s{font-size:11px;padding:5px 8px;border-radius:6px;background:#FEE2E2;color:#DC2626;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* GRID VIEW */
.grid-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.g-card{background:white;border-radius:10px;border:1px solid #E5E7EB;padding:14px;cursor:pointer;transition:all 0.15s;}
.g-card:hover{border-color:#0062FF;box-shadow:0 2px 12px rgba(255,92,26,0.1);}
.g-card.mine{border-left:3px solid #0062FF;}
.g-card-top{display:flex;gap:9px;align-items:center;margin-bottom:10px;}
.g-card .name-txt{font-size:14px;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:#9CA3AF;}
.empty-ico{font-size:36px;margin-bottom:12px;}
.empty h3{font-size:15px;color:#374151;margin-bottom:6px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(15,27,45,0.7);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.mo.on{opacity:1;pointer-events:all;}
.mo-box{background:white;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform 0.2s;}
.mo.on .mo-box{transform:translateY(0);}
.mo-head{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F3F4F6;position:sticky;top:0;background:white;z-index:1;}
.mo-title{font-size:17px;font-weight:700;color:#111827;}
.mo-close{width:28px;height:28px;border-radius:7px;background:#F3F4F6;border:none;cursor:pointer;font-size:16px;color:#6B7280;display:flex;align-items:center;justify-content:center;}
.mo-body{padding:20px 24px 24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.4px;}
.fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:8px;border:1.5px solid #E5E7EB;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;color:#111827;transition:border-color 0.15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#0062FF;}
.fg textarea{resize:vertical;min-height:70px;}

/* 연락처 타입 */
.contact-row{display:flex;gap:8px;}
.contact-type{padding:9px 12px;border-radius:8px;border:1.5px solid #E5E7EB;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;color:#111827;background:white;width:130px;flex-shrink:0;}
.contact-type:focus{border-color:#0062FF;}
.contact-val{flex:1;padding:9px 12px;border-radius:8px;border:1.5px solid #E5E7EB;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;color:#111827;}
.contact-val:focus{border-color:#0062FF;}

/* 태그 입력 */
.tag-box{border:1.5px solid #E5E7EB;border-radius:8px;padding:7px 10px;min-height:44px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:text;transition:border-color 0.15s;}
.tag-box:focus-within{border-color:#0062FF;}
.tag-chip{display:flex;align-items:center;gap:3px;background:#F3E8FF;color:#6D28D9;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;}
.tag-chip button{background:none;border:none;color:#6D28D9;cursor:pointer;font-size:13px;padding:0;line-height:1;}
.tag-box input{border:none;outline:none;font-size:13px;flex:1;min-width:80px;padding:2px 0;font-family:'Noto Sans KR',sans-serif;background:transparent;}

/* 지역 입력 */
.region-box{border:1.5px solid #E5E7EB;border-radius:8px;padding:8px 10px;transition:border-color 0.15s;}
.region-box:focus-within{border-color:#0062FF;}
.region-added{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.r-chip{display:flex;align-items:center;gap:3px;background:#0F1B2D;color:white;padding:3px 9px;border-radius:6px;font-size:11px;}
.r-chip button{background:none;border:none;color:white;cursor:pointer;font-size:12px;padding:0;}
.r-add-row{display:flex;gap:5px;flex-wrap:wrap;}
.r-sel-sm{padding:5px 8px;border-radius:6px;border:1px solid #E5E7EB;font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;color:#374151;background:white;}
.r-sel-sm:focus{border-color:#0062FF;}
.btn-radd{padding:5px 12px;border-radius:6px;background:#0F1B2D;color:white;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

.mo-footer{display:flex;gap:8px;padding-top:16px;border-top:1px solid #F3F4F6;margin-top:16px;}
.btn-cancel{flex:1;padding:11px;border-radius:9px;background:#F3F4F6;color:#374151;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-save{flex:2;padding:11px;border-radius:9px;background:#0062FF;color:white;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* DETAIL */
.detail-hero{background:linear-gradient(135deg,#1A2E46,#0F1B2D);padding:24px;display:flex;align-items:center;gap:16px;position:relative;}
.detail-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:white;flex-shrink:0;overflow:hidden;}
.detail-nm{font-size:20px;font-weight:900;color:white;margin-bottom:3px;}
.detail-sub{font-size:12px;color:#9CA3AF;}
.detail-body{padding:20px 24px 24px;}
.detail-sec{margin-bottom:18px;}
.detail-lbl{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
.detail-val{font-size:14px;font-weight:600;color:#111827;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.detail-actions{display:flex;gap:8px;padding:0 24px 24px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:white;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:999;transform:translateY(70px);opacity:0;transition:all 0.3s;border-left:3px solid #0062FF;}
.toast.on{transform:translateY(0);opacity:1;}

@media(max-width:768px){
  .sidebar{display:none;}
  .layout{padding:12px;}
  .tbl-head,.tbl-row{grid-template-columns:1fr 60px 90px;}
  .cell-sports,.cell-region{display:none;}
  .stat-bar,.user-nm{display:none;}
}
</style>
</head>

async function loadCoaches(){
  const q=query(collection(db,'coaches'),orderBy('createdAt','desc'));
  const snap=await getDocs(q);
  coaches=snap.docs.map(d=>({id:d.id,...d.data()}));
  updateStats(); render();
}

function updateStats(){
  document.getElementById('totalCount').textContent=coaches.length;
  document.getElementById('seekingCount').textContent=coaches.filter(c=>c.status==='available').length;
  document.getElementById('hiringCount').textContent=coaches.filter(c=>c.status==='seeking').length;
  document.getElementById('cnt_seek').textContent=coaches.filter(c=>c.status==='available').length;
  document.getElementById('cnt_hire').textContent=coaches.filter(c=>c.status==='seeking').length;
}

function buildSportFilters(){
  const el=document.getElementById('sportFilters');
  el.innerHTML=MAIN_SPORTS.map((s,i)=>`
    <div class="sb-item">
      <input type="checkbox" id="fsp_${i}" onchange="applyFilters()">
      <label for="fsp_${i}">${s}</label>
    </div>`).join('');
}

function getChecked(id){return document.getElementById(id)?.checked;}
function getAgeGroup(age){if(!age)return null;if(age<30)return'20';if(age<40)return'30';if(age<50)return'40';return'50';}

function formatDate(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds*1000);
  const now = new Date();
  const diff = Math.floor((now - d) / (1000*60*60*24));
  if(diff === 0) return '오늘';
  if(diff === 1) return '어제';
  if(diff < 7) return diff+'일 전';
  if(diff < 30) return Math.floor(diff/7)+'주 전';
  return Math.floor(diff/30)+'달 전';
}

function isOldPost(ts){
  if(!ts) return false;
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds*1000);
  return (new Date() - d) > 30*24*60*60*1000;
}

function renderRegionLabel(regions){
  if(!regions||!regions.length)return'-';
  if(regions.length===1)return regions[0];
  const sidos=[...new Set(regions.map(r=>r.split(' ')[0]))];
  if(sidos.length===1){
    if(regions.some(r=>r===sidos[0]+' 전체'))return sidos[0]+' 전체';
    return sidos[0]+' '+regions.length+'개 구';
  }
  return regions[0]+' 외 '+(regions.length-1)+'곳';
}

window.applyFilters=function(){render();};
window.resetAllFilters=function(){
  ['fs_seek','fs_hire','fg_m','fg_f','fa_20','fa_30','fa_40','fa_50'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
  MAIN_SPORTS.forEach((_,i)=>{const el=document.getElementById('fsp_'+i);if(el)el.checked=false;});
  render();
};

function getFiltered(){
  const statusOn=[getChecked('fs_seek')&&'available',getChecked('fs_hire')&&'seeking'].filter(Boolean);
  const genderOn=[getChecked('fg_m')&&'남',getChecked('fg_f')&&'여'].filter(Boolean);
  const ageOn=[getChecked('fa_20')&&'20',getChecked('fa_30')&&'30',getChecked('fa_40')&&'40',getChecked('fa_50')&&'50'].filter(Boolean);
  const sportOn=MAIN_SPORTS.filter((_,i)=>getChecked('fsp_'+i));
  const q=searchQuery.toLowerCase();
  const {sido,sigungu,dong}=filterRegion;

  return coaches.filter(c=>{
    // 블라인드 글은 관리자와 작성자만 볼 수 있음
    if(c.blinded && currentUser?.uid!==ADMIN_UID && c.authorUid!==currentUser?.uid) return false;
    if(statusOn.length&&!statusOn.includes(c.status))return false;
    if(genderOn.length&&!genderOn.includes(c.gender))return false;
    if(ageOn.length&&!ageOn.includes(getAgeGroup(c.age)))return false;
    if(sportOn.length&&!sportOn.some(s=>(c.sports||[]).some(cs=>cs.includes(s)||s.includes(cs))))return false;
    if(sido){
      const match=(c.regions||[]).some(r=>{
        if(!r.includes(sido))return false;
        if(sigungu&&!r.includes(sigungu))return false;
        if(dong&&!r.includes(dong))return false;
        return true;
      });
      if(!match)return false;
    }
    if(q){
      const inName=c.name?.includes(q);
      const inSports=(c.sports||[]).some(s=>s.toLowerCase().includes(q));
      const inRegions=(c.regions||[]).some(r=>r.includes(q));
      const inBio=c.bio?.includes(q);
      if(!inName&&!inSports&&!inRegions&&!inBio)return false;
    }
    return true;
  });
}

window.saveCoach=async()=>{
  const name=document.getElementById('f_name').value.trim();
  const contactVal=document.getElementById('f_contact_val').value.trim();
  if(!name){showToast('이름 또는 닉네임은 필수입니다');return;}

  if(!contactVal){showToast('연락 방법을 입력해주세요');return;}
  if(sportTags.length===0){showToast('지도 종목을 입력해주세요');return;}
  if(regionList.length===0){showToast('출강 가능 지역을 추가해주세요');return;}
  const data={
    name,
    gender:document.getElementById('f_gender').value,
    age:document.getElementById('f_age').value?parseInt(document.getElementById('f_age').value):null,
    status:document.getElementById('f_status').value,
    career:document.getElementById('f_career').value.trim(),
    cert:document.getElementById('f_cert').value.trim(),
    salary:document.getElementById('f_salary').value.trim(),
    category:document.getElementById('f_category').value,
    contactType:document.getElementById('f_contact_type').value,
    contactVal,
    sports:[...sportTags],
    regions:[...regionList],
    bio:document.getElementById('f_bio').value.trim(),
    authorUid:currentUser.uid,
    authorName:currentUser.displayName,
    authorPhoto:currentUser.photoURL,
  };
  try{
    if(editingId){await updateDoc(doc(db,'coaches',editingId),{...data,updatedAt:serverTimestamp()});showToast('✅ 수정되었습니다');}
    else{data.createdAt=serverTimestamp();await addDoc(collection(db,'coaches'),data);showToast('✅ 등록되었습니다');}
    closeModal('editModal'); await loadCoaches();
  }catch(e){showToast('저장 실패: '+e.message);}
};

function renderSportTags(){
  const box=document.getElementById('sportTagBox');
  const input=document.getElementById('sportTagInput');
  box.querySelectorAll('.tag-chip').forEach(el=>el.remove());
  sportTags.forEach((tag,i)=>{
    const el=document.createElement('div');
    el.className='tag-chip';
    el.innerHTML=`#${tag} <button onclick="removeSportTag(${i})">×</button>`;
    box.insertBefore(el,input);
  });
}
window.removeSportTag=i=>{sportTags.splice(i,1);renderSportTags();};
const sportInput = document.getElementById('sportTagInput');
let isComposing = false;

function addSportTag() {
  const val = sportInput.value.replace(/[,#]/g,'').trim();
  if(val && !sportTags.includes(val)) { sportTags.push(val); renderSportTags(); }
  sportInput.value = '';
}

sportInput.addEventListener('compositionstart', () => { isComposing = true; });
sportInput.addEventListener('compositionend', () => {
  isComposing = false;
});
sportInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    if(isComposing) {
      setTimeout(() => { addSportTag(); }, 50);
    } else {
      addSportTag();
    }
  }
});

window.reportPost=async id=>{
  const c=coaches.find(x=>x.id===id);
  if(!c||c.authorUid===currentUser?.uid){showToast('본인 글은 신고할 수 없어요');return;}
  if(!confirm('이 글을 신고하시겠습니까?\n허위 또는 부적절한 글만 신고해주세요.')){return;}
  try{
    const myReports=JSON.parse(localStorage.getItem('reported')||'[]');
    if(myReports.includes(id)){showToast('이미 신고한 글이에요');return;}
    const newCnt=(c.reportCount||0)+1;
    const shouldBlind=newCnt>=3;
    await updateDoc(doc(db,'coaches',id),{
      reportCount:increment(1),
      blinded:shouldBlind
    });
    myReports.push(id);
    localStorage.setItem('reported',JSON.stringify(myReports));
    c.reportCount=newCnt;
    if(shouldBlind){c.blinded=true;}
    showToast(shouldBlind?'신고 3회 누적으로 블라인드 처리됐습니다':'신고가 접수됐습니다');
    render();
    closeModal('detailModal');
  }catch(e){showToast('신고 실패: '+e.message);}
};

        <div style="font-size:13px;font-weight:600;">${c.name}</div>
        <div style="font-size:11px;color:#9CA3AF;">${(c.sports||[]).map(s=>'#'+s).join(' ')} · ${c.authorName||''}</div>
        <div style="font-size:11px;color:#9CA3AF;">${formatDate(c.createdAt)}</div>
      </div>
      <div style="text-align:center;">
        <span style="font-size:13px;font-weight:700;color:${(c.reportCount||0)>=3?'#DC2626':'#B45309'};">🚩 ${c.reportCount||0}회</span>
      </div>
      <div style="text-align:center;">
        <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${c.blinded?'#FEE2E2':'#DCFCE7'};color:${c.blinded?'#DC2626':'#15803D'};">${c.blinded?'블라인드':'정상'}</span>
      </div>
      <div style="display:flex;gap:5px;justify-content:flex-end;">
        ${c.blinded?`<button class="btn-admin-unblind" onclick="adminUnblind('${c.id}')">복구</button>`:''}
        <button class="btn-admin-del" onclick="adminDelete('${c.id}')">삭제</button>
      </div>
    </div>`).join('');
  el.innerHTML=`<div class="admin-wrap">
    <div class="admin-head">🛡 관리자 — 신고 현황 (${reported.length}건)</div>
    <div style="display:grid;grid-template-columns:1fr 80px 80px 120px;padding:8px 18px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;">
      <span style="font-size:10px;font-weight:700;color:#9CA3AF;">글 정보</span>
      <span style="font-size:10px;font-weight:700;color:#9CA3AF;text-align:center;">신고수</span>
      <span style="font-size:10px;font-weight:700;color:#9CA3AF;text-align:center;">상태</span>
      <span style="font-size:10px;font-weight:700;color:#9CA3AF;text-align:right;">액션</span>
    </div>
    ${rows}
  </div>`;
}

window.adminUnblind=async id=>{
  if(currentUser?.uid!==ADMIN_UID)return;
  await updateDoc(doc(db,'coaches',id),{blinded:false,reportCount:0});
  showToast('✅ 블라인드 해제됐습니다');
  await loadCoaches();
  renderAdmin();
};

window.adminDelete=async id=>{
  if(currentUser?.uid!==ADMIN_UID)return;
  if(!confirm('이 글을 완전히 삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'coaches',id));
  showToast('🗑 글이 삭제됐습니다');
  await loadCoaches();
  renderAdmin();
};


window.openTypeModal=()=>{
  document.getElementById('typeModal').classList.add('on');
};

window.selectType=status=>{
  closeModal('typeModal');
  // 한 계정당 1글 제한 미리 체크
  const myPosts=coaches.filter(c=>c.authorUid===currentUser?.uid&&c.status===status);
  if(myPosts.length>0){
    showToast(status==='available'?'구직 글은 1개만 등록 가능해요. 내 글 관리에서 수정해주세요.':'채용 글은 1개만 등록 가능해요. 내 글 관리에서 수정해주세요.');
    return;
  }
  openAddModal(status);
};


window.toggleDropdown=id=>{
  // 다른 드롭다운 모두 닫기
  document.querySelectorAll('.dropdown-menu').forEach(el=>{
    if(el.id!==id) el.style.display='none';
  });
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
};
window.closeDropdown=id=>{
  const el=document.getElementById(id);
  if(el) el.style.display='none';
};
// 외부 클릭시 드롭다운 닫기
document.addEventListener('click',()=>{
  document.querySelectorAll('.dropdown-menu').forEach(el=>el.style.display='none');
});

window.showToast=msg=>{
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
};
</script>
</body>
</html>
